<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Recipe Book</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --terracotta: #C1622F;
      --terracotta-light: #FAECE7;
      --dark-brown: #4A2E1A;
      --muted: #9A8070;
      --border: rgba(139,94,60,0.18);
      --bg: #FDFAF6;
      --surface: #FFFFFF;
      --text: #2C1A0E;
      --text-secondary: #6B4F3A;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1A1208;
        --surface: #241A0F;
        --text: #F5EDE0;
        --text-secondary: #C4A882;
        --border: rgba(196,168,130,0.15);
        --terracotta-light: #3A1A0A;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 28px; color: var(--terracotta); }
    .logo-text { font-size: 22px; font-weight: 600; color: var(--text); }
    .logo-sub { font-size: 12px; color: var(--muted); }
    .add-btn {
      background: var(--terracotta); color: white; border: none;
      border-radius: var(--radius-md); padding: 9px 18px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .add-btn:hover { background: var(--dark-brown); }

    /* Search & filter */
    .search-row { display: flex; gap: 10px; margin-bottom: 1.25rem; }
    .search-wrap { flex: 1; position: relative; }
    .search-wrap i {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%); color: var(--muted); font-size: 16px;
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%; padding: 9px 12px 9px 36px;
      border-radius: var(--radius-md); border: 1px solid var(--border);
      background: var(--surface); font-size: 14px; color: var(--text);
    }
    .search-wrap input:focus { outline: 2px solid var(--terracotta); }
    .filter-select {
      padding: 9px 12px; border-radius: var(--radius-md);
      border: 1px solid var(--border); background: var(--surface);
      font-size: 13px; color: var(--text); cursor: pointer;
    }

    /* Grid */
    .count { font-size: 13px; color: var(--muted); margin-bottom: 1rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .card {
      background: var(--surface); border-radius: var(--radius-lg);
      border: 1px solid var(--border); padding: 1.1rem;
      cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover { border-color: var(--terracotta); box-shadow: 0 2px 12px rgba(193,98,47,0.1); }
    .card-emoji { font-size: 30px; margin-bottom: 8px; }
    .card-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 5px; line-height: 1.3; }
    .card-meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
    .card-meta span { display: flex; align-items: center; gap: 3px; }
    .tag {
      display: inline-block; background: var(--terracotta-light);
      color: var(--terracotta); border-radius: 4px;
      padding: 2px 8px; font-size: 11px; font-weight: 500;
    }
    .empty { text-align: center; padding: 4rem 1rem; color: var(--muted); grid-column: 1/-1; }
    .empty i { font-size: 44px; display: block; margin-bottom: 12px; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 100;
      align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: var(--radius-lg);
      border: 1px solid var(--border); padding: 1.5rem;
      width: 100%; max-width: 540px; max-height: 90vh;
      overflow-y: auto; position: relative;
    }
    .modal h2 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 1.25rem; }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 22px; line-height: 1;
    }

    /* Form */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; border-radius: var(--radius-md);
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: 14px; padding: 9px 12px;
      font-family: inherit; resize: vertical;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: 2px solid var(--terracotta);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-actions { display: flex; gap: 10px; margin-top: 1.25rem; justify-content: flex-end; }
    .btn-cancel {
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 9px 16px;
      font-size: 14px; cursor: pointer; color: var(--text-secondary);
    }
    .btn-save {
      background: var(--terracotta); color: white; border: none;
      border-radius: var(--radius-md); padding: 9px 20px;
      font-size: 14px; font-weight: 500; cursor: pointer;
    }
    .btn-save:hover { background: var(--dark-brown); }
    .btn-delete {
      background: none; border: 1px solid #E24B4A;
      border-radius: var(--radius-md); padding: 9px 14px;
      font-size: 13px; cursor: pointer; color: #A32D2D; margin-right: auto;
    }

    /* Recipe detail */
    .detail-emoji { font-size: 40px; margin-bottom: 8px; }
    .detail-title { font-size: 24px; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.2; }
    .detail-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .chip {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 4px 10px;
      font-size: 12px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 4px;
    }
    .section-title {
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin: 1.25rem 0 0.6rem;
    }
    .ingredients-list { list-style: none; }
    .ingredients-list li {
      padding: 6px 0; border-bottom: 1px solid var(--border);
      font-size: 14px; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .ingredients-list li:last-child { border-bottom: none; }
    .ingredients-list li::before {
      content: ''; display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--terracotta); flex-shrink: 0;
    }
    .ing-group-header {
      padding: 12px 0 4px !important; font-size: 12px !important;
      font-weight: 600 !important; color: var(--terracotta) !important;
      border-bottom: none !important; text-transform: capitalize;
    }
    .ing-group-header::before { display: none !important; }
    .method-text { font-size: 14px; color: var(--text); line-height: 1.75; white-space: pre-wrap; }
    .note-box {
      background: var(--terracotta-light); border-radius: var(--radius-md);
      padding: 12px 14px; font-size: 13px; color: #7A3010;
      margin-top: 1rem; line-height: 1.6;
    }

    @media (max-width: 500px) {
      .header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .form-row { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 360px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <i class="ti ti-cookbook logo-icon" aria-hidden="true"></i>
      <div>
        <div class="logo-text">The Recipe Book</div>
        <div class="logo-sub">shared collection</div>
      </div>
    </div>
    <button class="add-btn" onclick="openAdd()">
      <i class="ti ti-plus" aria-hidden="true"></i> Add recipe
    </button>
  </div>

  <div class="search-row">
    <div class="search-wrap">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="search" placeholder="Search recipes…" oninput="render()">
    </div>
    <select class="filter-select" id="catFilter" onchange="render()">
      <option value="">All categories</option>
      <option>Breakfast</option><option>Lunch</option><option>Dinner</option>
      <option>Snacks</option><option>Baking</option><option>Desserts</option>
      <option>Drinks</option><option>Other</option>
    </select>
  </div>

  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('addModal')" aria-label="Close">
      <i class="ti ti-x"></i>
    </button>
    <h2 id="formTitle">Add a recipe</h2>
    <div class="form-group">
      <label>Recipe name</label>
      <input type="text" id="f-name" placeholder="e.g. Grandma's Tomato Soup">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="f-cat">
          <option>Breakfast</option><option>Lunch</option><option>Dinner</option>
          <option>Snacks</option><option>Baking</option><option>Desserts</option>
          <option>Drinks</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Emoji</label>
        <input type="text" id="f-emoji" placeholder="🍲" maxlength="4">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Prep time</label>
        <input type="text" id="f-prep" placeholder="e.g. 30 mins">
      </div>
      <div class="form-group">
        <label>Serves</label>
        <input type="text" id="f-serves" placeholder="e.g. 4">
      </div>
    </div>
    <div class="form-group">
      <label>Ingredients (one per line — start a line with "For the..." or "Sauce:" etc. for a section header)</label>
      <textarea id="f-ingredients" rows="5" placeholder="For the sauce:&#10;3 tbsp soy sauce&#10;2 cloves garlic"></textarea>
    </div>
    <div class="form-group">
      <label>Method</label>
      <textarea id="f-method" rows="6" placeholder="1. Step one...&#10;2. Step two..."></textarea>
    </div>
    <div class="form-group">
      <label>Notes / tips (optional)</label>
      <textarea id="f-notes" rows="2" placeholder="Any substitutions, storage tips…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-delete" id="deleteBtn" style="display:none" onclick="deleteRecipe()">
        <i class="ti ti-trash"></i> Delete
      </button>
      <button class="btn-cancel" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn-save" onclick="saveRecipe()">Save recipe</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="modal-overlay" id="viewModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('viewModal')" aria-label="Close">
      <i class="ti ti-x"></i>
    </button>
    <div id="viewContent"></div>
    <div class="form-actions" style="margin-top:1.5rem">
      <button class="btn-cancel" onclick="editCurrent()">
        <i class="ti ti-edit" style="font-size:14px"></i> Edit
      </button>
      <button class="btn-save" onclick="closeModal('viewModal')">Done</button>
    </div>
  </div>
</div>

<script>
  // ─── DATA ───────────────────────────────────────────────────────────────────
  // To add a new recipe, copy one of the objects below, fill in the fields,
  // and add it to the end of this array. Then re-upload the file to GitHub.
  const BUILT_IN_RECIPES = [
    {
      id: 'gochujang1',
      name: 'Spicy Gochujang Stir-Fried Chicken',
      category: 'Dinner', emoji: '🌶️', prep: '30 mins', serves: '2–3',
      ingredients: `0.8 lbs boneless, skinless chicken thighs, cut into bite-sized pieces
3 tbsp gochujang
3 tbsp low-sodium soy sauce
2 tbsp water
3 tbsp brown sugar
3 tsp sesame oil
2 cloves garlic, minced
2 tbsp canola oil
Roasted sesame seeds, to top
Green onions, to top`,
      method: `1. In a bowl, combine the gochujang, soy sauce, water, brown sugar, sesame oil, and minced garlic. Mix well and set aside.

2. Cut chicken into bite-sized pieces. Add 5 tablespoons of the gochujang mixture to the chicken, mix well and marinate for 10 minutes.

3. Heat canola oil in a large pan over medium heat. Add the marinated chicken and cook for about 5 minutes, stir-frying occasionally so each side colours.

4. Increase heat to high and pour in the remaining gochujang sauce. Stir-fry for a further 3–5 minutes until the sauce thickens and the chicken is cooked through.

5. Serve topped with roasted sesame seeds and sliced green onions. Best eaten with steamed white rice.`,
      notes: 'Chicken thighs stay juicier than breasts here — worth using if you can. You can double the sauce and throw in extra veg like peppers or courgette.'
    },
    {
      id: 'karaage1',
      name: 'Karaage Japanese Fried Chicken',
      category: 'Dinner', emoji: '🍗', prep: '45 mins', serves: '2',
      ingredients: `300g boneless skin-on chicken thighs
3 tbsp soy sauce
1 tbsp cooking sake
5g fresh ginger, grated
2 cloves garlic, crushed
1/4 cup katakuriko potato starch, to coat
Cooking oil, for frying
Japanese mayonnaise, to serve
Lemon wedges, to serve`,
      method: `1. Cut chicken into bite-size pieces. Leave a little skin and fat on for extra crispiness.

2. Combine grated ginger, crushed garlic, soy sauce and cooking sake in a bowl. Add the chicken, coat well, and marinate for 30 minutes.

3. Drain any excess liquid from the chicken and add the katakuriko potato starch. Mix until the pieces are fully coated.

4. Heat cooking oil to around 180°C. Test by dropping in a little flour — if it sizzles on impact, the oil is ready. Fry 3–4 pieces at a time for 3–4 minutes until deep golden brown. Drain on a wire rack or kitchen roll.

5. Serve hot or cold with lemon wedges and a squeeze of Japanese mayonnaise.`,
      notes: 'Keeping the skin on is key for crispiness. Katakuriko potato starch gives a lighter coating than cornstarch — worth seeking out at an Asian supermarket.'
    },
    {
      id: 'misoudon1',
      name: 'Spicy Miso Udon Noodles',
      category: 'Dinner', emoji: '🍜', prep: '25 mins', serves: '2',
      ingredients: `For the miso peanut sauce:
40g peanut butter
25g white miso
20ml rice vinegar
20ml soy sauce
1 tbsp sugar
½ tsp MSG (optional)
65ml water

For the herb salad:
½ cucumber
10g fresh coriander
4 spring onions

For the spicy chicken:
1 garlic clove
1 tbsp gochujang
1 tbsp Korean chilli flakes
1 tbsp dark soy sauce
1 tbsp rice vinegar
1 tbsp sugar
400g chicken mince
1 tbsp vegetable oil

To serve:
200g udon noodles`,
      method: `1. Make the miso peanut sauce: whisk together the peanut butter, white miso, rice vinegar, soy sauce, sugar and MSG until smooth. Slowly drizzle in the water while whisking until velvety and pourable. Set aside.

2. Make the herb salad: slice the cucumber into thin half moons, pick the coriander leaves and finely slice the green tops of the spring onions. Combine in a bowl. Chill in iced water if you want more crunch.

3. Make the chilli sauce: add the garlic, gochujang, Korean chilli flakes, dark soy, rice vinegar, sugar and the white parts of the spring onions to a blender. Blitz until smooth and set aside.

4. Cook the chicken: heat a large frying pan over high heat. Add the oil, then the chicken mince. Press flat and let it brown deeply on one side before breaking it up. Cook through, then pour in the chilli sauce. Stir and bubble for 2–3 minutes until thick and sticky.

5. Cook the noodles according to pack instructions. Drain and toss immediately with the miso peanut sauce and a splash of warm noodle water until glossy.

6. Divide the noodles between bowls. Top with the spicy chicken and herb salad. Finish with extra miso peanut sauce if you like.`,
      notes: 'Per serving: 50g protein, 676 cal, 26g fat, 60g carbs. MSG is optional but adds depth. Don\'t skip the iced water for the herb salad — makes it noticeably crunchier.'
    },
    {
      id: 'dakdoritang1',
      name: 'Boneless Dakdoritang',
      category: 'Dinner', emoji: '🍲', prep: '40 mins', serves: '2–3',
      ingredients: `4 chicken thigh cutlets
2 potatoes
1 onion
1 stalk green onion
1 chilli pepper

Sauce:
3 tbsp soy sauce
3 tbsp minced garlic
300ml water
1 tbsp sugar
1.5 tbsp mirim
2 tbsp gochugaru
1 tbsp oyster sauce
1.5 tbsp gochujang
Black pepper, to taste`,
      method: `1. Sear the chicken thigh cutlets skin-side (or fatty side) down first, then cut into bite-sized pieces.

2. Add soy sauce and garlic and stir-fry for about 2–3 minutes.

3. Pour in the water, then add sugar, mirim, gochugaru, gochujang, oyster sauce, and black pepper. Bring to a boil and skim off any foam.

4. Add the potatoes and onion, cover, and simmer over medium-low heat for about 15 minutes.

5. If using rice cakes or ramen noodles, add them in along with the green onion and chilli. Once cooked through, it's ready.`,
      notes: 'Highly recommended to throw in rice cakes or ramen noodles at the end if you have them — it takes it to another level.'
    },
    {
      id: 'porkadobo1',
      name: 'Pork Adobo',
      category: 'Dinner', emoji: '🥩', prep: '1.5–2 hrs', serves: '4',
      ingredients: `Pork Adobo:
1.2 kg pork belly (or cut of choice)
15–20 cloves garlic, minced (more is always welcome)
1 onion, chopped
500ml pork broth
190ml soy sauce
100ml cane vinegar
3 long green chillies
4 bay leaves
1 tbsp whole peppercorns
30g palm sugar, chopped (adjust to sweetness)
Oil, for frying

Toppings:
Sliced onion leeks
Crispy garlic bits
Boiled eggs`,
      method: `1. Fry the pork until lightly browned on all sides, then remove and set aside.

2. In the same pot, sauté the garlic until lightly golden and fragrant. Add the onions and cook until softened.

3. Return the pork to the pot and pour in the pork broth. Add the soy sauce, vinegar, green chillies, bay leaves, peppercorns, and palm sugar.

4. Cover and let simmer on medium heat for 5–10 minutes. Do not stir — this allows the vinegar to cook off properly.

5. Turn to low heat for 1–2 hours, until the pork is tender and the sauce has reduced. You want it almost swimming in its own fat, like a confit.

6. Optional: add soft boiled eggs 2–3 minutes before serving to retain their jamminess.

7. Serve over hot rice, topped with crispy garlic bits, sliced leeks, and a boiled egg on the side.`,
      notes: 'Don\'t stir during the initial simmer — it lets the vinegar cook out properly. Cane vinegar is traditional but white wine vinegar works in a pinch. Palm sugar can be swapped for brown sugar.'
    }
  ];

  // ─── STATE ──────────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'recipebook_user_recipes';
  let userRecipes = [];
  let editingId = null;
  let viewingId = null;

  function getAllRecipes() {
    return [...BUILT_IN_RECIPES, ...userRecipes];
  }

  function loadUserRecipes() {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      userRecipes = stored ? JSON.parse(stored) : [];
    } catch(e) { userRecipes = []; }
    render();
  }

  function saveUserRecipes() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(userRecipes)); } catch(e) {}
  }

  // ─── RENDER ─────────────────────────────────────────────────────────────────
  function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const cat = document.getElementById('catFilter').value;
    const all = getAllRecipes();
    const filtered = all.filter(r => {
      const matchQ = !q || r.name.toLowerCase().includes(q) || (r.ingredients||'').toLowerCase().includes(q);
      const matchCat = !cat || r.category === cat;
      return matchQ && matchCat;
    });
    const grid = document.getElementById('grid');
    document.getElementById('count').textContent =
      filtered.length === 1 ? '1 recipe' : `${filtered.length} recipes`;
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty"><i class="ti ti-mood-empty"></i>No recipes found</div>`;
      return;
    }
    grid.innerHTML = filtered.map(r => `
      <div class="card" onclick="viewRecipe('${r.id}')" role="button" tabindex="0"
           onkeydown="if(event.key==='Enter')viewRecipe('${r.id}')">
        <div class="card-emoji">${r.emoji || '🍽️'}</div>
        <div class="card-title">${esc(r.name)}</div>
        <div class="card-meta">
          ${r.prep ? `<span><i class="ti ti-clock" style="font-size:12px"></i>${esc(r.prep)}</span>` : ''}
          ${r.serves ? `<span><i class="ti ti-users" style="font-size:12px"></i>${esc(r.serves)}</span>` : ''}
        </div>
        <span class="tag">${esc(r.category)}</span>
      </div>
    `).join('');
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderIngredients(ingredients) {
    const lines = (ingredients||'').split('\n').filter(Boolean);
    let html = '<ul class="ingredients-list">';
    for (const line of lines) {
      const isHeader = /^(for |to |sauce|toppings|pork adobo)/i.test(line.trim());
      html += isHeader
        ? `<li class="ing-group-header">${esc(line)}</li>`
        : `<li>${esc(line)}</li>`;
    }
    return html + '</ul>';
  }

  // ─── VIEW ───────────────────────────────────────────────────────────────────
  function viewRecipe(id) {
    const r = getAllRecipes().find(x => x.id === id);
    if (!r) return;
    viewingId = id;
    document.getElementById('viewContent').innerHTML = `
      <div class="detail-emoji">${r.emoji || '🍽️'}</div>
      <div class="detail-title">${esc(r.name)}</div>
      <div class="detail-chips">
        <span class="tag">${esc(r.category)}</span>
        ${r.prep ? `<span class="chip"><i class="ti ti-clock"></i>${esc(r.prep)}</span>` : ''}
        ${r.serves ? `<span class="chip"><i class="ti ti-users"></i>Serves ${esc(r.serves)}</span>` : ''}
      </div>
      ${r.ingredients ? `<div class="section-title">Ingredients</div>${renderIngredients(r.ingredients)}` : ''}
      ${r.method ? `<div class="section-title">Method</div><p class="method-text">${esc(r.method)}</p>` : ''}
      ${r.notes ? `<div class="note-box"><strong>💡 Tips:</strong> ${esc(r.notes)}</div>` : ''}
    `;
    document.getElementById('viewModal').classList.add('open');
  }

  function editCurrent() {
    closeModal('viewModal');
    openEdit(viewingId);
  }

  // ─── ADD / EDIT ─────────────────────────────────────────────────────────────
  function openAdd() {
    editingId = null;
    document.getElementById('formTitle').textContent = 'Add a recipe';
    document.getElementById('deleteBtn').style.display = 'none';
    ['name','emoji','prep','serves','ingredients','method','notes'].forEach(f =>
      document.getElementById('f-'+f).value = '');
    document.getElementById('f-cat').value = 'Dinner';
    document.getElementById('addModal').classList.add('open');
  }

  function openEdit(id) {
    const r = getAllRecipes().find(x => x.id === id);
    if (!r) return;
    editingId = id;
    document.getElementById('formTitle').textContent = 'Edit recipe';
    document.getElementById('deleteBtn').style.display =
      userRecipes.find(x => x.id === id) ? 'block' : 'none';
    document.getElementById('f-name').value = r.name || '';
    document.getElementById('f-emoji').value = r.emoji || '';
    document.getElementById('f-cat').value = r.category || 'Dinner';
    document.getElementById('f-prep').value = r.prep || '';
    document.getElementById('f-serves').value = r.serves || '';
    document.getElementById('f-ingredients').value = r.ingredients || '';
    document.getElementById('f-method').value = r.method || '';
    document.getElementById('f-notes').value = r.notes || '';
    document.getElementById('addModal').classList.add('open');
  }

  function saveRecipe() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { alert('Please enter a recipe name.'); return; }
    const r = {
      id: editingId || 'u' + Date.now(),
      name,
      emoji: document.getElementById('f-emoji').value.trim() || '🍽️',
      category: document.getElementById('f-cat').value,
      prep: document.getElementById('f-prep').value.trim(),
      serves: document.getElementById('f-serves').value.trim(),
      ingredients: document.getElementById('f-ingredients').value.trim(),
      method: document.getElementById('f-method').value.trim(),
      notes: document.getElementById('f-notes').value.trim(),
    };
    const existingUserIdx = userRecipes.findIndex(x => x.id === editingId);
    if (existingUserIdx > -1) {
      userRecipes[existingUserIdx] = r;
    } else {
      userRecipes.push(r);
    }
    saveUserRecipes();
    closeModal('addModal');
    render();
  }

  function deleteRecipe() {
    if (!confirm('Delete this recipe?')) return;
    userRecipes = userRecipes.filter(x => x.id !== editingId);
    saveUserRecipes();
    closeModal('addModal');
    render();
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  // Close modals on overlay click
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target === el) el.classList.remove('open');
    });
  });

  loadUserRecipes();
</script>
</body>
</html>
